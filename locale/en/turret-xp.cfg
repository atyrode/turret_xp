[mod-setting-description]
turret-xp-xp-per-damage=XP awarded per point of final damage dealt by gun turrets. Defaults low because damage totals grow quickly.
turret-xp-xp-per-kill-credit=XP awarded for one full kill credit. Shared proportionally across gun turrets based on damage contribution.
turret-xp-level-base-xp=XP required to advance from level 0 to level 1 before growth is applied.
turret-xp-level-growth=Linear growth step applied to each next level's XP requirement. At the default 1.65 value, each level adds 65% of the base XP to the next requirement.
