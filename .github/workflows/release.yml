name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.10.3.
        required: true
        type: string

permissions:
  contents: read

env:
  FACTORIO_HEADLESS_VERSION: 2.0.76
  FACTORIO_DIR: ${{ github.workspace }}/.factorio-ci/factorio
  FACTORIO_MODS_DIR: ${{ github.workspace }}/.factorio-ci/mods
  PYTHON: python3

jobs:
  build-test-attach:
    name: Build, Test, And Attach Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FACTORIO_SERVICE_USERNAME: ${{ secrets.FACTORIO_SERVICE_USERNAME }}
      FACTORIO_SERVICE_TOKEN: ${{ secrets.FACTORIO_SERVICE_TOKEN }}

    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${RELEASE_TAG}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Lua compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Verify tag matches info.json
        run: |
          version="$(python3 -c 'import json; print(json.load(open("info.json"))["version"])')"
          expected_tag="v${version}"
          if [ "${expected_tag}" != "${{ steps.release.outputs.tag }}" ]; then
            echo "Release tag ${{ steps.release.outputs.tag }} does not match info.json version ${version}." >&2
            exit 1
          fi

      - name: Require Mod Portal download credentials
        run: |
          if [ -z "${FACTORIO_SERVICE_USERNAME}" ] || [ -z "${FACTORIO_SERVICE_TOKEN}" ]; then
            echo "Missing FACTORIO_SERVICE_USERNAME and/or FACTORIO_SERVICE_TOKEN secrets for Mod Portal dependency downloads." >&2
            exit 1
          fi

      - name: Restore Factorio headless cache
        id: cache-factorio
        uses: actions/cache@v5
        with:
          path: ${{ env.FACTORIO_DIR }}
          key: ${{ runner.os }}-factorio-headless-${{ env.FACTORIO_HEADLESS_VERSION }}

      - name: Download Factorio headless
        if: steps.cache-factorio.outputs.cache-hit != 'true'
        run: |
          factorio_archive="${RUNNER_TEMP}/factorio-headless.tar.xz"
          rm -rf "${FACTORIO_DIR}"
          curl -fsSL --retry 3 --retry-delay 5 \
            -o "${factorio_archive}" \
            "https://www.factorio.com/get-download/${FACTORIO_HEADLESS_VERSION}/headless/linux64"
          mkdir -p "${FACTORIO_DIR}"
          tar -xJf "${factorio_archive}" -C "${FACTORIO_DIR}" --strip-components=1

      - name: Verify Factorio headless
        run: |
          "${FACTORIO_DIR}/bin/x64/factorio" --version

      - name: Restore Mod Portal dependency cache
        id: cache-mod-deps
        uses: actions/cache@v5
        with:
          path: ${{ env.FACTORIO_MODS_DIR }}
          key: ${{ runner.os }}-factorio-mod-deps-${{ hashFiles('info.json', 'scripts/download-mod-dependencies.py') }}

      - name: Download required Mod Portal dependencies
        run: scripts/download-mod-dependencies.py --mods-dir "${FACTORIO_MODS_DIR}"

      - name: Run headless suite
        env:
          FACTORIO_BIN: ${{ env.FACTORIO_DIR }}/bin/x64/factorio
        run: scripts/test-headless.sh

      - name: Build release package
        id: package
        run: |
          package_path="$(scripts/package.sh | tail -n 1)"
          test -f "${package_path}"
          echo "package_path=${package_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: turret-xp-${{ steps.release.outputs.tag }}
          path: ${{ steps.package.outputs.package_path }}
          if-no-files-found: error

      - name: Attach package to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag }}" "${{ steps.package.outputs.package_path }}" --clobber

  publish-mod-portal:
    name: Publish Mod Portal Release
    runs-on: ubuntu-latest
    needs: build-test-attach
    environment:
      name: factorio-mod-portal
      url: https://mods.factorio.com/mod/turret_xp
    env:
      FACTORIO_MOD_PORTAL_API_KEY: ${{ secrets.FACTORIO_MOD_PORTAL_API_KEY }}

    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${RELEASE_TAG}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Lua compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Require Mod Portal publish key
        run: |
          if [ -z "${FACTORIO_MOD_PORTAL_API_KEY}" ]; then
            echo "Missing FACTORIO_MOD_PORTAL_API_KEY secret for Mod Portal publishing." >&2
            exit 1
          fi

      - name: Publish to Factorio Mod Portal
        env:
          SKIP_HEADLESS_TESTS: "1"
        run: scripts/publish-portal.sh
