name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FACTORIO_HEADLESS_VERSION: 2.0.76
  FACTORIO_DIR: ${{ github.workspace }}/.factorio-ci/factorio
  FACTORIO_MODS_DIR: ${{ github.workspace }}/.factorio-ci/mods
  PYTHON: python3
  LUAC: luac5.2
  STYLUA_VERSION: 2.5.2
  STYLUA_SHA256: bcb0d855e91f102f28a370e850f8566b3b44b79e6274d806ea5246837c0fd5ab

jobs:
  package:
    name: Basic Checks And Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect CI change scope
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci-change-scope.sh

      - name: Skip package build
        if: steps.changes.outputs.package_changed != 'true'
        run: echo "No package-impacting changes detected; skipping package validation."

      - name: Set up Python
        if: steps.changes.outputs.package_changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Lua tooling
        if: steps.changes.outputs.package_changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua-check lua5.2

          stylua_dir="${RUNNER_TEMP}/stylua"
          stylua_archive="${RUNNER_TEMP}/stylua.zip"
          mkdir -p "${stylua_dir}"
          curl -fsSL \
            -o "${stylua_archive}" \
            "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip"
          echo "${STYLUA_SHA256}  ${stylua_archive}" | sha256sum -c -
          python3 -m zipfile -e "${stylua_archive}" "${stylua_dir}"
          chmod +x "${stylua_dir}/stylua"
          echo "${stylua_dir}" >> "${GITHUB_PATH}"

      - name: Run strict Lua tooling
        if: steps.changes.outputs.package_changed == 'true'
        env:
          REQUIRE_LUA_TOOLS: "1"
        run: scripts/lint-lua.sh

      - name: Run package build
        if: steps.changes.outputs.package_changed == 'true'
        id: package
        run: |
          package_path="$(scripts/package.sh | tail -n 1)"
          test -f "${package_path}"
          echo "package_path=${package_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload package artifact
        if: steps.changes.outputs.package_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: turret-xp-package
          path: ${{ steps.package.outputs.package_path }}
          if-no-files-found: error

  headless:
    name: Headless Factorio Tests
    runs-on: ubuntu-latest
    env:
      FACTORIO_SERVICE_USERNAME: ${{ secrets.FACTORIO_SERVICE_USERNAME }}
      FACTORIO_SERVICE_TOKEN: ${{ secrets.FACTORIO_SERVICE_TOKEN }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect CI change scope
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci-change-scope.sh

      - name: Skip headless suite
        if: steps.changes.outputs.headless_changed != 'true'
        run: echo "No Factorio-runtime-impacting changes detected; skipping headless Factorio tests."

      - name: Set up Python
        if: steps.changes.outputs.headless_changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Check Mod Portal download credentials
        if: steps.changes.outputs.headless_changed == 'true'
        id: portal-auth
        run: |
          if [ -n "${FACTORIO_SERVICE_USERNAME}" ] && [ -n "${FACTORIO_SERVICE_TOKEN}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::Skipping headless Factorio tests because FACTORIO_SERVICE_USERNAME and FACTORIO_SERVICE_TOKEN secrets are not configured."
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Restore Factorio headless cache
        if: steps.portal-auth.outputs.available == 'true'
        id: cache-factorio
        uses: actions/cache@v5
        with:
          path: ${{ env.FACTORIO_DIR }}
          key: ${{ runner.os }}-factorio-headless-${{ env.FACTORIO_HEADLESS_VERSION }}

      - name: Download Factorio headless
        if: steps.portal-auth.outputs.available == 'true' && steps.cache-factorio.outputs.cache-hit != 'true'
        run: |
          factorio_archive="${RUNNER_TEMP}/factorio-headless.tar.xz"
          rm -rf "${FACTORIO_DIR}"
          curl -fsSL --retry 3 --retry-delay 5 \
            -o "${factorio_archive}" \
            "https://www.factorio.com/get-download/${FACTORIO_HEADLESS_VERSION}/headless/linux64"
          mkdir -p "${FACTORIO_DIR}"
          tar -xJf "${factorio_archive}" -C "${FACTORIO_DIR}" --strip-components=1

      - name: Verify Factorio headless
        if: steps.portal-auth.outputs.available == 'true'
        run: |
          "${FACTORIO_DIR}/bin/x64/factorio" --version

      - name: Restore Mod Portal dependency cache
        if: steps.portal-auth.outputs.available == 'true'
        id: cache-mod-deps
        uses: actions/cache@v5
        with:
          path: ${{ env.FACTORIO_MODS_DIR }}
          key: ${{ runner.os }}-factorio-mod-deps-${{ hashFiles('info.json', 'scripts/download-mod-dependencies.py') }}

      - name: Download required Mod Portal dependencies
        if: steps.portal-auth.outputs.available == 'true'
        run: scripts/download-mod-dependencies.py --mods-dir "${FACTORIO_MODS_DIR}"

      - name: Run headless suite
        if: steps.portal-auth.outputs.available == 'true'
        env:
          FACTORIO_BIN: ${{ env.FACTORIO_DIR }}/bin/x64/factorio
        run: scripts/test-headless.sh
